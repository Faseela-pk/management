{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block title %}{{ title }} - EduManage{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow border-0 mt-5 mb-5">
            <div class="card-header bg-white text-center pb-0 border-0 pt-4">
                <h3 class="mb-0 text-primary fw-bold">{{ title }}</h3>
                <p class="text-muted small">Fill out the details below</p>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Submit</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
