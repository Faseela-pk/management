{% extends 'core/base.html' %}
{% block title %}Confirm Delete - EduManage{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow border-0 border-danger border-top border-4">
            <div class="card-body p-5 text-center">
                <h3 class="text-danger fw-bold mb-3">Confirm Deletion</h3>
                <p class="fs-5">Are you sure you want to delete <strong>"{{ object }}"</strong>?</p>
                <p class="text-muted small mb-4">This action cannot be undone.</p>
                
                <form method="post" class="d-flex justify-content-center gap-3">
                    {% csrf_token %}
                    <a href="javascript:history.back()" class="btn btn-light shadow-sm px-4 rounded-pill">Cancel</a>
                    <button type="submit" class="btn btn-danger shadow-sm px-4 rounded-pill">Yes, Delete</button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
