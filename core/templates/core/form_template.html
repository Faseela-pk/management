{% extends 'core/base.html' %}
{% load crispy_forms_tags %}
{% block title %}{{ title }} - EduManage{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4 mb-5">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-white pb-0 border-0 pt-4">
                <h3 class="mb-0 fw-bold text-primary">{{ title }}</h3>
                <p class="text-muted small">Fill out the form below</p>
            </div>
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="mt-4 text-end">
                        <a href="javascript:history.back()" class="btn btn-light shadow-sm me-2 rounded-pill px-4">Cancel</a>
                        <button type="submit" class="btn btn-primary shadow-sm px-4 rounded-pill px-4">Save</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
