{% extends 'core/base.html' %}
{% load crispy_forms_tags %}
{% block title %}My Profile - EduManage{% endblock %}
{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-md-6">
        <div class="card shadow border-0">
            <div class="card-header bg-white pb-0 border-0 pt-4 text-center">
                {% if user.profile_picture %}
                    <img src="{{ user.profile_picture.url }}" alt="Profile" class="rounded-circle mb-3 shadow-sm border" width="100" height="100" style="object-fit: cover;">
                {% else %}
                    {% load static %}
                    <img src="{% static 'images/default_profile.svg' %}" alt="Profile" class="rounded-circle mb-3 shadow-sm border" width="100" height="100" style="background-color: #f8f9fa;">
                {% endif %}
                <h3 class="fw-bold text-primary">User Information</h3>
            </div>
            <div class="card-body p-4 pt-2">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary rounded-pill shadow-sm">Save Changes</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
