{% extends 'core/base.html' %}
{% load crispy_forms_tags %}

{% block title %}Login - EduManage{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow border-0 mt-5">
            <div class="card-header bg-white text-center pb-0 border-0 pt-4">
                <h3 class="mb-0 text-primary fw-bold">Welcome Back</h3>
                <p class="text-muted small">Sign in to your account</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg shadow-sm">Sign In</button>
                    </div>
                </form>
                <div class="text-center mt-3">
                    <small>Don't have an account? <a href="{% url 'register' %}" class="text-decoration-none">Register here</a></small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
